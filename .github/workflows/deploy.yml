name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify project structure
        run: |
          echo "Checking project structure..."
          ls -la
          echo "Frontend folder:"
          ls frontend/
          echo "Backend folder:"
          ls backend/
          echo "Docs folder:"
          ls docs/

      - name: Validate docs exist
        run: |
          test -f docs/project-proposal.md && echo "project-proposal.md OK"
          test -f docs/architecture.md && echo "architecture.md OK"
          test -f docs/database-schema.md && echo "database-schema.md OK"

      - name: Build check passed
        run: echo "FitMeals CI passed successfully!"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Copy frontend to server
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST "sudo mkdir -p /var/www/recipe-app"
          scp -i ~/.ssh/id_rsa frontend/index.html $SSH_USER@$SSH_HOST:/tmp/index.html
          ssh -i ~/.ssh/id_rsa $SSH_USER@$SSH_HOST "sudo mv /tmp/index.html /var/www/recipe-app/index.html"

      - name: Copy and build backend on server
        run: |
          scp -i ~/.ssh/id_rsa backend/main.go $SSH_USER@$SSH_HOST:/tmp/main.go
          ssh -i ~/.ssh/id_rsa $SSH_USER@$SSH_HOST "cd /tmp && go build -o fitmeals-backend main.go && sudo mv fitmeals-backend /usr/local/bin/fitmeals-backend && sudo chmod +x /usr/local/bin/fitmeals-backend"

      - name: Deploy service file and restart backend
        run: |
          scp -i ~/.ssh/id_rsa backend/fitmeals.service $SSH_USER@$SSH_HOST:/tmp/fitmeals.service
          ssh -i ~/.ssh/id_rsa $SSH_USER@$SSH_HOST "sudo mv /tmp/fitmeals.service /etc/systemd/system/fitmeals-backend.service && sudo systemctl daemon-reload && sudo systemctl enable fitmeals-backend && sudo systemctl restart fitmeals-backend"
          sleep 3
          ssh -i ~/.ssh/id_rsa $SSH_USER@$SSH_HOST "sudo systemctl is-active fitmeals-backend"
